name: Build Ready Installers

on:
  workflow_dispatch:

jobs:
  build-windows-portable:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      # ── Cache pub packages ──────────────────────────────────────────────────
      - name: Cache Flutter pub cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ${{ env.LOCALAPPDATA }}\Pub\Cache
          key: ${{ runner.os }}-pub-${{ hashFiles('frontend_template/pubspec.yaml') }}
          restore-keys: ${{ runner.os }}-pub-

      # ── Cache Gradle ────────────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      # bootstrap_flutter_project.ps1 now runs flutter gen-l10n (fix for
      # "undefined getter AppLocalizations" compile error on Windows).
      - name: Bootstrap Flutter project
        run: |
          Set-Location scripts
          powershell -ExecutionPolicy Bypass -File .\bootstrap_flutter_project.ps1 -ProjectPath ..\production_report_app -TemplatePath ..\frontend_template

      - name: Build Windows portable app
        run: |
          Set-Location scripts
          powershell -ExecutionPolicy Bypass -File .\build_windows.ps1 -ProjectPath ..\production_report_app

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build Windows installer (Setup.exe)
        run: iscc installer\windows_installer.iss

      - name: Compress Windows portable output
        run: |
          Compress-Archive `
            -Path production_report_app\build\windows\x64\runner\Release\* `
            -DestinationPath windows-portable.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-setup-exe
          path: installer_output/ProductionReportSetup.exe

      - uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: windows-portable.zip

  build-android-release-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── Cache pub packages ──────────────────────────────────────────────────
      - name: Cache Flutter pub cache
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('frontend_template/pubspec.yaml') }}
          restore-keys: ${{ runner.os }}-pub-

      # ── Cache Gradle ────────────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # bootstrap_flutter_project.sh now runs flutter gen-l10n (fix for
      # "undefined getter AppLocalizations" compile error on Android).
      - name: Bootstrap Flutter project
        run: |
          cd scripts
          chmod +x bootstrap_flutter_project.sh
          ./bootstrap_flutter_project.sh ../production_report_app ../frontend_template

      - name: Build Android release APK (split per ABI for smaller size)
        run: |
          cd production_report_app
          flutter build apk --release --split-per-abi

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk-release
          path: production_report_app/build/app/outputs/flutter-apk/app-*-release.apk
