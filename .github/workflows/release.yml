name: Release APK and EXE

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-windows-installer:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Cache Flutter pub cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ${{ env.LOCALAPPDATA }}\Pub\Cache
          key: ${{ runner.os }}-pub-${{ hashFiles('frontend_template/pubspec.yaml') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Bootstrap Flutter project
        run: |
          Set-Location scripts
          powershell -ExecutionPolicy Bypass -File .\bootstrap_flutter_project.ps1 -ProjectPath ..\production_report_app -TemplatePath ..\frontend_template

      - name: Build Windows portable app
        run: |
          Set-Location scripts
          powershell -ExecutionPolicy Bypass -File .\build_windows.ps1 -ProjectPath ..\production_report_app

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build Windows installer (Setup.exe)
        run: iscc installer\windows_installer.iss

      - name: Compress Windows portable output
        run: |
          Compress-Archive `
            -Path production_report_app\build\windows\x64\runner\Release\* `
            -DestinationPath windows-portable.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-setup-exe
          path: installer_output/ProductionReportSetup.exe

      - uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: windows-portable.zip

  build-android-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Flutter pub cache
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('frontend_template/pubspec.yaml') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Bootstrap Flutter project
        run: |
          cd scripts
          chmod +x bootstrap_flutter_project.sh
          ./bootstrap_flutter_project.sh ../production_report_app ../frontend_template

      - name: Build Android release APK (split per ABI)
        run: |
          cd production_report_app
          flutter build apk --release --split-per-abi

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk-release
          path: production_report_app/build/app/outputs/flutter-apk/app-*-release.apk

  publish-release:
    needs: [ build-windows-installer, build-android-apk ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: windows-setup-exe
          path: release-assets

      - name: Download Windows portable
        uses: actions/download-artifact@v4
        with:
          name: windows-portable
          path: release-assets

      - name: Download Android APKs
        uses: actions/download-artifact@v4
        with:
          name: android-apk-release
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Production Report ${{ github.ref_name }}
          body: |
            ## Production Report ${{ github.ref_name }}

            ### Downloads
            | Platform | File | Description |
            |----------|------|-------------|
            | Windows  | `ProductionReportSetup.exe` | Windows installer |
            | Windows  | `windows-portable.zip` | Portable (no install needed) |
            | Android  | `app-arm64-v8a-release.apk` | Android APK (64-bit) |
            | Android  | `app-armeabi-v7a-release.apk` | Android APK (32-bit) |
            | Android  | `app-x86_64-release.apk` | Android APK (x86-64) |

            ### Backend
            Deploy the `backend/` folder to Railway (or any Python host).
            See `README.md` for full setup instructions.
          files: release-assets/**
          draft: false
          prerelease: false
