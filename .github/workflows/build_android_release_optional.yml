name: Build Android Release Optional

on:
  workflow_dispatch:

jobs:
  build-android-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── Cache pub packages ──────────────────────────────────────────────────
      - name: Cache Flutter pub cache
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('frontend_template/pubspec.yaml') }}
          restore-keys: ${{ runner.os }}-pub-

      # ── Cache Gradle ────────────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # bootstrap_flutter_project.sh now runs flutter gen-l10n (fix for
      # "undefined getter AppLocalizations" compile error).
      - name: Bootstrap Flutter project
        run: |
          cd scripts
          chmod +x bootstrap_flutter_project.sh
          ./bootstrap_flutter_project.sh ../production_report_app ../frontend_template

      # FIX: heredoc rewritten without leading indentation so Gradle can parse
      # key.properties correctly. Variables are expanded via the shell (not EOF).
      - name: Create keystore and key.properties
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd production_report_app/android
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > upload-keystore.jks
          # No leading indentation — property values must start at column 0.
          cat > key.properties << EOF
storePassword=${ANDROID_KEYSTORE_PASSWORD}
keyPassword=${ANDROID_KEY_PASSWORD}
keyAlias=${ANDROID_KEY_ALIAS}
storeFile=upload-keystore.jks
EOF

      - name: Patch signing config if needed
        run: |
          APP_GRADLE=production_report_app/android/app/build.gradle
          if [ -f "$APP_GRADLE" ] && ! grep -q "key.properties" "$APP_GRADLE"; then
            echo "WARNING: build.gradle does not reference key.properties"
            echo "         Release signing may fail."
            echo "         Add the key.properties wiring block to android/app/build.gradle."
          fi

      - name: Check required secrets
        run: |
          if [ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "ERROR: ANDROID_KEYSTORE_BASE64 secret is not set. Skipping release build."
            exit 1
          fi

      - name: Build signed APK and AAB
        run: |
          cd production_report_app
          flutter build apk --release
          flutter build appbundle --release

      - uses: actions/upload-artifact@v4
        with:
          name: android-release-builds
          path: |
            production_report_app/build/app/outputs/flutter-apk/app-release.apk
            production_report_app/build/app/outputs/bundle/release/app-release.aab
