name: Build Windows + Android

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      # ── Cache pub packages ──────────────────────────────────────────────────
      - name: Cache Flutter pub cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ${{ env.LOCALAPPDATA }}\Pub\Cache
          key: ${{ runner.os }}-pub-${{ hashFiles('frontend_template/pubspec.yaml') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: Bootstrap Flutter project
        shell: pwsh
        run: |
          cd scripts
          powershell -ExecutionPolicy Bypass -File .\bootstrap_flutter_project.ps1 -ProjectPath ..\production_report_app -TemplatePath ..\frontend_template

      # ── Cache Gradle ────────────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build Windows
        shell: pwsh
        run: |
          cd scripts
          powershell -ExecutionPolicy Bypass -File .\build_windows.ps1 -ProjectPath ..\production_report_app

      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: production_report_app/build/windows/x64/runner/Release/**

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── Cache pub packages ──────────────────────────────────────────────────
      - name: Cache Flutter pub cache
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('frontend_template/pubspec.yaml') }}
          restore-keys: ${{ runner.os }}-pub-

      # ── Cache Gradle ────────────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Bootstrap Flutter project
        run: |
          cd scripts
          chmod +x bootstrap_flutter_project.sh
          ./bootstrap_flutter_project.sh ../production_report_app ../frontend_template

      - name: Build APK
        run: |
          cd production_report_app
          flutter build apk --release

      - name: Build AAB
        run: |
          cd production_report_app
          flutter build appbundle --release

      - uses: actions/upload-artifact@v4
        with:
          name: android-builds
          path: |
            production_report_app/build/app/outputs/flutter-apk/app-release.apk
            production_report_app/build/app/outputs/bundle/release/app-release.aab
