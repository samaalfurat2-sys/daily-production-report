def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterRoot = localProperties.getProperty('flutter.sdk')
if (flutterRoot == null) {
    throw new GradleException("Flutter SDK not found. Define location with flutter.sdk in the local.properties file.")
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) { flutterVersionCode = '11' }

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) { flutterVersionName = '2.11.0' }

apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'
apply from: "$flutterRoot/packages/flutter_tools/gradle/flutter.gradle"
// Uncomment for Firebase:
apply plugin: 'com.google.gms.google-services'

android {
    namespace 'com.dailyproduction.report'
    compileSdkVersion 34
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    signingConfigs {
        debug {
            // Default debug signing — used automatically
        }
        release {
            // ── RELEASE SIGNING ─────────────────────────────────────────────
            // Set these in ~/.gradle/gradle.properties (never commit keys to VCS):
            //   RELEASE_STORE_FILE=/path/to/release.keystore
            //   RELEASE_STORE_PASSWORD=yourStorePassword
            //   RELEASE_KEY_ALIAS=yourKeyAlias
            //   RELEASE_KEY_PASSWORD=yourKeyPassword
            if (project.hasProperty('RELEASE_STORE_FILE')) {
                storeFile file(RELEASE_STORE_FILE)
                storePassword RELEASE_STORE_PASSWORD
                keyAlias RELEASE_KEY_ALIAS
                keyPassword RELEASE_KEY_PASSWORD
            } else {
                // Fallback to debug signing during development
                signingConfig = signingConfigs.debug
            }
        }
    }

    defaultConfig {
        applicationId 'com.dailyproduction.report'
        minSdkVersion 21           // WorkManager requires API 14+; FCM requires 19+; targeting 21 covers all
        targetSdkVersion 34
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true
        resValue "string", "app_name", "Daily Production Report"
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            applicationIdSuffix '.debug'
            versionNameSuffix '-debug'
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
    // WorkManager is pulled in transitively by the workmanager Flutter plugin.
    implementation 'androidx.work:work-runtime-ktx:2.9.0'
    // Firebase (uncomment after `flutterfire configure`):
    implementation platform('com.google.firebase:firebase-bom:33.1.0')
    implementation 'com.google.firebase:firebase-messaging-ktx'
}
