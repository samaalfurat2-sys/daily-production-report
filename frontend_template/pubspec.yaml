name: production_report_app
description: Daily Production Report (Windows + Android)
version: 3.0.0+3
publish_to: none

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  http: ^1.2.2
  shared_preferences: ^2.3.2
  provider: ^6.1.2
  crypto: ^3.0.3
  path_provider: ^2.1.0
  # flutter_appauth enables PKCE / authorization-code OAuth on Android.
  # Used by lib/auth/onedrive_auth.dart as the recommended alternative to
  # the device-code flow when running on Android devices.
  flutter_appauth: ^8.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/logo.png
