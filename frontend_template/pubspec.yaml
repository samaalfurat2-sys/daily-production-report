name: production_report_app
description: Daily Production Report (Windows + Android)
publish_to: "none"
version: 2.11.0+11

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  http: ^1.2.2
  shared_preferences: ^2.3.2
  provider: ^6.1.2
  sqflite: ^2.3.3
  path: ^1.9.0
  web_socket_channel: ^3.0.1
  uuid: ^4.4.0
  connectivity_plus: ^6.0.5
  workmanager: ^0.5.2
  firebase_core: ^3.3.0
  firebase_messaging: ^15.0.4
  flutter_local_notifications: ^17.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  generate: true
  uses-material-design: true
